name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Linux x86-64
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Run tests
        # The vendored cudarc examples include optional CUPTI demos whose
        # feature is intentionally disabled in the production binary.
        run: cargo test --workspace --exclude cudarc --locked

      - name: Lint TTS binary
        run: cargo clippy --locked -p chew-tts --no-deps

      - name: Build release binary
        run: cargo build --release --locked -p chew-tts

      - name: Package binary
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0-${GITHUB_SHA::7}"
          fi
          bundle="chew-tts-${version}-linux-x86_64"
          mkdir -p dist
          mkdir -p "dist/${bundle}"
          cp target/release/chew-tts "dist/${bundle}/chew-tts"
          cp README.md LICENSE "dist/${bundle}/"
          chmod 755 "dist/${bundle}/chew-tts"
          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"
          rm -rf "dist/${bundle}"
          (
            cd dist
            sha256sum "${bundle}.tar.gz" > SHA256SUMS
          )

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: chew-tts-linux-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --title "chew-tts ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
