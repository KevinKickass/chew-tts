<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chew</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e4e4e4;
  --text-dim: #888;
  --accent: #6ee7b7;
  --accent-dim: #065f46;
  --user-bg: #1a2332;
  --danger: #f87171;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

header h1 span { color: var(--accent); }

.header-info {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  margin-right: 4px;
}

.status-dot.offline { background: var(--danger); }

/* Settings bar */
.settings-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  flex-shrink: 0;
  overflow-x: auto;
}

.setting-group {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.setting-group label { color: var(--text-dim); }

.setting-group input[type=range] {
  width: 80px;
  accent-color: var(--accent);
}

.setting-group input[type=number] {
  width: 64px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 2px 6px;
  font-size: 12px;
  font-family: var(--mono);
}

.setting-group .val {
  font-family: var(--mono);
  color: var(--accent);
  min-width: 32px;
  text-align: right;
}

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.chat-container::-webkit-scrollbar { width: 6px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.message {
  max-width: 800px;
  margin: 0 auto 16px;
  padding: 14px 18px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.message.user {
  background: var(--user-bg);
  border: 1px solid #1e3a5f;
}

.message.assistant {
  background: var(--surface);
  border: 1px solid var(--border);
}

.message.system-msg {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  font-size: 12px;
  text-align: center;
  padding: 8px;
}

.message .role-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--text-dim);
}

.message.user .role-tag { color: #60a5fa; }
.message.assistant .role-tag { color: var(--accent); }

.message .content { }

.message .content code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 3px;
}

.message .content pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.5;
}

.message .content pre code {
  background: none;
  padding: 0;
}

.message .meta {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
}

.typing-indicator {
  display: inline-block;
  color: var(--accent);
}

.typing-indicator::after {
  content: '...';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0%, 20% { content: ''; }
  40% { content: '.'; }
  60% { content: '..'; }
  80%, 100% { content: '...'; }
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  text-align: center;
  gap: 12px;
}

.empty-state .logo {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -2px;
}

.empty-state p { font-size: 14px; max-width: 400px; }

/* Input area */
.input-area {
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  background: var(--surface);
  flex-shrink: 0;
}

.input-row {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 16px;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  min-height: 44px;
  max-height: 200px;
  outline: none;
  transition: border-color 0.15s;
}

.input-row textarea:focus { border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--text-dim); }

.input-row button {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}

.input-row button:hover { opacity: 0.85; }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  background: var(--surface2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
}

.input-footer {
  max-width: 800px;
  margin: 6px auto 0;
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<header>
  <h1><span>chew</span> inference</h1>
  <div class="header-info">
    <span id="model-name">loading...</span>
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">connecting</span></span>
  </div>
</header>

<div class="settings-bar">
  <div class="setting-group">
    <label>System prompt:</label>
    <input type="text" id="system-prompt" placeholder="optional" style="width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:2px 6px;font-size:12px;">
  </div>
  <div class="setting-group">
    <label>Temp:</label>
    <input type="range" id="temp" min="0" max="2" step="0.05" value="0.7">
    <span class="val" id="temp-val">0.70</span>
  </div>
  <div class="setting-group">
    <label>Top-P:</label>
    <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9">
    <span class="val" id="top-p-val">0.90</span>
  </div>
  <div class="setting-group">
    <label>Max tokens:</label>
    <input type="number" id="max-tokens" value="1024" min="1" max="32768">
  </div>
</div>

<div class="chat-container" id="chat">
  <div class="empty-state" id="empty-state">
    <div class="logo">chew</div>
    <p>GPU inference engine. Type a message to start.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
    <button class="btn-secondary" onclick="clearChat()">Clear</button>
  </div>
  <div class="input-footer">
    <span id="token-info"></span>
    <span>Enter to send, Shift+Enter for newline</span>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');
const tempSlider = document.getElementById('temp');
const topPSlider = document.getElementById('top-p');
const tempVal = document.getElementById('temp-val');
const topPVal = document.getElementById('top-p-val');
const tokenInfo = document.getElementById('token-info');

let messages = [];
let generating = false;

// Settings
tempSlider.oninput = () => tempVal.textContent = parseFloat(tempSlider.value).toFixed(2);
topPSlider.oninput = () => topPVal.textContent = parseFloat(topPSlider.value).toFixed(2);

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!generating) sendMessage();
  }
});

// Check server health
async function checkHealth() {
  try {
    const r = await fetch('/health');
    if (r.ok) {
      document.getElementById('status-dot').classList.remove('offline');
      document.getElementById('status-text').textContent = 'online';
    }
  } catch {
    document.getElementById('status-dot').classList.add('offline');
    document.getElementById('status-text').textContent = 'offline';
  }
}

async function loadModelInfo() {
  try {
    const r = await fetch('/v1/models');
    const data = await r.json();
    if (data.data && data.data.length > 0) {
      document.getElementById('model-name').textContent = data.data[0].id;
    }
  } catch {}
}

function addMessageEl(role, content, meta) {
  if (emptyState) emptyState.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const roleTag = document.createElement('div');
  roleTag.className = 'role-tag';
  roleTag.textContent = role;
  div.appendChild(roleTag);

  const contentEl = document.createElement('div');
  contentEl.className = 'content';
  contentEl.textContent = content;
  div.appendChild(contentEl);

  if (meta) {
    const metaEl = document.createElement('div');
    metaEl.className = 'meta';
    metaEl.textContent = meta;
    div.appendChild(metaEl);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return contentEl;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || generating) return;

  generating = true;
  sendBtn.disabled = true;
  sendBtn.textContent = 'Generating...';
  input.value = '';
  input.style.height = 'auto';

  messages.push({ role: 'user', content: text });
  addMessageEl('user', text);

  // Build request messages
  const reqMessages = [];
  const sysprompt = document.getElementById('system-prompt').value.trim();
  if (sysprompt) {
    reqMessages.push({ role: 'system', content: sysprompt });
  }
  reqMessages.push(...messages);

  // Add assistant placeholder
  const contentEl = addMessageEl('assistant', '');
  const typingSpan = document.createElement('span');
  typingSpan.className = 'typing-indicator';
  contentEl.appendChild(typingSpan);

  const startTime = performance.now();

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: reqMessages,
        temperature: parseFloat(tempSlider.value),
        top_p: parseFloat(topPSlider.value),
        max_tokens: parseInt(document.getElementById('max-tokens').value) || 1024,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: { message: resp.statusText } }));
      throw new Error(err.error?.message || resp.statusText);
    }

    const data = await resp.json();
    const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
    const choice = data.choices[0];
    const assistantText = choice.message.content;

    contentEl.textContent = assistantText;
    messages.push({ role: 'assistant', content: assistantText });

    // Meta info
    const usage = data.usage;
    const tps = usage.completion_tokens / parseFloat(elapsed);
    const metaEl = document.createElement('div');
    metaEl.className = 'meta';
    metaEl.textContent = `${usage.prompt_tokens} prompt + ${usage.completion_tokens} completion = ${usage.total_tokens} tokens | ${elapsed}s | ${tps.toFixed(1)} tok/s | ${choice.finish_reason}`;
    contentEl.parentElement.appendChild(metaEl);

    tokenInfo.textContent = `Last: ${usage.total_tokens} tokens, ${tps.toFixed(1)} tok/s`;

  } catch (err) {
    contentEl.textContent = `Error: ${err.message}`;
    contentEl.style.color = 'var(--danger)';
  }

  generating = false;
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
  input.focus();
}

function clearChat() {
  messages = [];
  chat.innerHTML = '';
  if (emptyState) {
    const es = document.createElement('div');
    es.className = 'empty-state';
    es.id = 'empty-state';
    es.innerHTML = '<div class="logo">chew</div><p>GPU inference engine. Type a message to start.</p>';
    chat.appendChild(es);
  }
  tokenInfo.textContent = '';
}

// Init
checkHealth();
loadModelInfo();
setInterval(checkHealth, 10000);
input.focus();
</script>
</body>
</html>
